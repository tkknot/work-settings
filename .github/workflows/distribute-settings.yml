name: Distribute settings to target repository

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repository (owner/repo).'
        required: true
        type: string
      target_base_branch:
        description: 'Base branch in the target repo to PR against'
        required: false
        default: 'main'
        type: string
      pr_draft:
        description: 'Open the PR as draft instead of ready-for-review'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: distribute-${{ inputs.target_repo }}
  cancel-in-progress: false

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout source (work-settings)
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          token: ${{ secrets.DISTRIBUTION_PAT }}
          path: target
          ref: ${{ inputs.target_base_branch }}
          fetch-depth: 0
          persist-credentials: true

      - name: Build payload (staging dir)
        run: bash source/.github/workflows/scripts/build-payload.sh source payload

      - name: Apply payload to target working tree
        run: bash source/.github/workflows/scripts/apply-payload.sh payload target

      - name: Compute branch name and source sha
        id: meta
        working-directory: source
        run: |
          set -euo pipefail
          echo "branch=chore/sync-work-settings-$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request in target repo
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          path: target
          token: ${{ secrets.DISTRIBUTION_PAT }}
          branch: ${{ steps.meta.outputs.branch }}
          base: ${{ inputs.target_base_branch }}
          delete-branch: true
          commit-message: |
            chore: sync work-settings (${{ steps.meta.outputs.source_sha }})

            Source: ${{ github.repository }}@${{ steps.meta.outputs.source_sha }}
          title: "chore: sync work-settings (${{ steps.meta.outputs.source_sha }})"
          body: |
            ## Summary
            ${{ github.repository }} から AI 設定ファイル (agent / cursor / claude) を同期します。

            - Source commit: `${{ steps.meta.outputs.source_sha }}`
            - Triggered by: @${{ github.actor }}

            ## 配布内容
            - `AGENTS.md` (root)
            - `.cursor/` (agents, commands, rules, skills, mcp.json, playwright-config.json)
            - `.cursorignore`, `.cursorindexingignore` (root)
            - `.claude/` (agents, commands, rules, skills, mcp.json, playwright-config.json, settings.json)
            - `.mcp.json` (root)

            ## Notes
            - 本 PR は `distribute-settings.yml` ワークフローにより自動生成されました。
            - `.cursor/` `.claude/` 配下は `rsync --delete` により work-settings の内容に完全同期されます。
          draft: ${{ inputs.pr_draft }}
          labels: |
            chore
            automated-sync

      - name: Report result
        if: always()
        run: |
          if [ "${{ steps.cpr.outputs.pull-request-number }}" != "" ]; then
            echo "PR created: ${{ steps.cpr.outputs.pull-request-url }}"
          else
            echo "No diff detected; PR was not created."
          fi
